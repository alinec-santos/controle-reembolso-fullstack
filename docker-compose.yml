services:
  backend:
    build:
      context: ./backend
    container_name: controle-reembolso-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:/app/prisma/dev.db"
      JWT_SECRET: "docker-secret"
    volumes:
      - ./backend/prisma:/app/prisma

  frontend:
    build:
      context: ./frontend
    container_name: controle-reembolso-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://localhost:3000"
    depends_on:
      - backend